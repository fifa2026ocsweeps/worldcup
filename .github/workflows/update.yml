name: Update Live Standings (Scheduled)

on:
  schedule:
    # 6:15 AM AEST = 20:15 UTC (prev day) — AEST is UTC+10, no DST in Jun–Jul
    - cron: '15 20 * * *'
    # 6:55 AM AEST = 20:55 UTC (prev day)
    - cron: '55 20 * * *'
    # 7:20 AM AEST = 21:20 UTC (prev day)
    - cron: '20 21 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run odds update script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/update_odds.py

      - name: Show updated data.json
        run: cat data.json

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "⚠️  data.json unchanged — nothing to commit"
          else
            git commit -m "chore: update live standings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ data.json committed and pushed"
          fi
