name: Update Live Standings

on:
  schedule:
    # 4:00 PM AEST = 06:00 UTC (AEST is UTC+10, no daylight saving in Jun–Jul)
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  update-odds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run odds update script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python scripts/update_odds.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update live standings [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
